<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Echoes Software Technologies</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'vivid-blue': '#1864ff'
          },
          fontFamily: {
            sans: ['Poppins', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    body {
      background: linear-gradient(135deg, #f0f4ff 0%, #e6f0ff 100%);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-white shadow-xl p-6 sm:p-8 border border-gray-100">
      <div class="flex justify-center mb-6">
        <img src="2.png" alt="Echoes Software Technologies Logo" class="w-[150px] h-[40px] object-contain"> <!-- Logo with 150*40px dimensions -->
      </div>
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-900">Welcome Back</h1>
        <p class="text-gray-600 mt-2">Please enter your credentials to access the admin console</p>
      </div>
      
      <form id="loginForm" class="space-y-6">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            required
            class="w-full px-4 py-3 border border-gray-300 focus:ring-2 focus:ring-vivid-blue focus:border-vivid-blue transition-colors"
            placeholder="Enter your username"
          >
        </div>
        
        <div>
          <div class="flex justify-between items-center mb-1">
            <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          </div>
          <input 
            type="password" 
            id="password" 
            name="password" 
            required
            class="w-full px-4 py-3 border border-gray-300 focus:ring-2 focus:ring-vivid-blue focus:border-vivid-blue transition-colors"
            placeholder="Enter your password"
          >
        </div>
        
        <div class="flex items-center">
          <input 
            type="checkbox" 
            id="remember" 
            name="remember"
            class="h-4 w-4 text-vivid-blue border-gray-300 focus:ring-vivid-blue"
          >
          <label for="remember" class="ml-2 block text-sm text-gray-700">Remember me</label>
        </div>
        
        <button 
          type="submit"
          class="w-full bg-vivid-blue hover:bg-blue-700 text-white font-semibold py-3 px-4 transition-colors duration-200 shadow-md"
        >
          Sign In
        </button>
      </form>
      
    <div class="mt-6 flex flex-col sm:flex-row justify-between items-center gap-4">
        <a href="#" class="text-sm text-vivid-blue hover:text-blue-700 font-medium">Forgot your password?</a>
        <a href="./index.html" class="inline-block bg-vivid-blue hover:bg-blue-700 text-white font-medium py-2 px-4 transition-colors duration-200 w-full sm:w-auto text-center">Website
        </a>
      </div>
    </div>
    
    <div class="mt-6 text-center">
      <p class="text-gray-600 text-sm">
        Need help? Contact your system administrator
      </p>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      
      // Simple authentication (in a real app, this would be handled by a backend)
      if (authenticateUser(username, password)) {
        // Redirect to 2FA verification page
        window.location.href = `two-factor-setup.html?username=${encodeURIComponent(username)}&remember=${remember}`;
      } else {
        alert('Invalid credentials. Please try again.');
      }
    });
    
    function authenticateUser(username, password) {
      // In a real application, this would be a server-side check
      // For now, we'll use a simple hardcoded check
      const validCredentials = [
        { username: 'admin@echoess.in', password: 'Echoes!Tech$Secure^Cloud_91' },
        { username: 'user@echoess.in', password: 'Echoes!Tech$Secure^Cloud_91' }
      ];
      
      return validCredentials.some(cred => 
        cred.username === username && cred.password === password
      );
    }
  </script>
  
  <!-- Disable developer tools and right-click functionality -->
  <script>
    // Disable F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U, Ctrl+Shift+C
    document.addEventListener('keydown', function(e) {
      // F12 key
      if (e.key === 'F12') {
        e.preventDefault();
        e.stopPropagation();
        return false;
      }
      
      // Ctrl+Shift+I (Developer Tools)
      if (e.ctrlKey && e.shiftKey && e.key === 'I') {
        e.preventDefault();
        e.stopPropagation();
        return false;
      }
      
      // Ctrl+Shift+J (Console)
      if (e.ctrlKey && e.shiftKey && e.key === 'J') {
        e.preventDefault();
        e.stopPropagation();
        return false;
      }
      
      // Ctrl+U (View Source)
      if (e.ctrlKey && e.key === 'u') {
        e.preventDefault();
        e.stopPropagation();
        return false;
      }
      
      // Ctrl+Shift+C (Inspect Element)
      if (e.ctrlKey && e.shiftKey && e.key === 'C') {
        e.preventDefault();
        e.stopPropagation();
        return false;
      }
      
      // Ctrl+Shift+K (Firefox Developer Tools)
      if (e.ctrlKey && e.shiftKey && e.key === 'K') {
        e.preventDefault();
        e.stopPropagation();
        return false;
      }
    });
    
    // Disable right-click functionality
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      return false;
    });
    
    // Disable text selection (optional additional security)
    document.addEventListener('selectstart', function(e) {
      e.preventDefault();
      return false;
    });
    
    // Disable dragging of elements
    document.addEventListener('dragstart', function(e) {
      e.preventDefault();
      return false;
    });
    
    // Additional protection against developer tools opening
    setInterval(function() {
      // Check if developer tools are open by measuring devtools dimensions
      if (window.outerHeight - window.innerHeight > 200 || 
          window.outerWidth - window.innerWidth > 200) {
        // Developer tools detected - you can add additional actions here
        // For example, redirect or show warning
        console.clear();
      }
    }, 1000);
  </script>
</body>
</html>
